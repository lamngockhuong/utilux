version: "2"

linters:
  default: standard
  enable:
    - errcheck

linters-settings:
  errcheck:
    # Ignore intentionally unchecked errors in defer statements
    exclude-functions:
      - (io.Closer).Close
      - (net/http.Response).Body.Close
      - (*os.File).Close
      - fmt.Scanln
      - fmt.Scan
      - fmt.Print
      - fmt.Println
      - fmt.Printf
