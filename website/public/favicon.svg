<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>
  <!-- Rounded background -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#1E293B"/>
  <!-- Lightning bolt - blurred, shifted right -->
  <polygon points="26,1 16,16 22,16 14,31 18,18 12,18 26,1" fill="#10B981" opacity="0.25" filter="url(#blur)"/>
  <!-- $_ prompt -->
  <text x="2" y="23" font-family="monospace" font-size="18" font-weight="bold" fill="#3B82F6">$_</text>
</svg>
